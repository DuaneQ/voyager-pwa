name: Functions — Unit Tests

# Runs the Cloud Functions unit-test suite on every push/PR to main.
# NO build artifacts are deployed — this job is test-only by design.
# The PWA frontend has been replaced by the RN Web app; only the functions
# package in this repo is still actively maintained.
on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/functions-unit-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/functions-unit-tests.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit tests (functions)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests with coverage
        run: npm test -- --coverage --ci --passWithNoTests
        env:
          CI: true
          # No real API keys — all external calls are mocked in unit tests
          GOOGLE_PLACES_API_KEY: test-key
          ADMIN_UID: test-admin-uid
          ADMIN_UIDS: test-admin-uid

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-coverage
          path: functions/coverage/
          retention-days: 14
